<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <label for="name">name:</label><br>
        <input type="text" id="name" name="name"><br><br>

        <label for="surname">surname:</label><br>
        <input type="text" id="surname" name="surname"><br><br>

        <label for="email">email:</label><br>
        <input type="email" id="email" name="email"><br><br>

        <label for="password">password:</label><br>
        <input type="password" id="password" name="password"><br><br>

        <label for="gender">gender:</label><br>
        <input type="radio" id="gender" name="gender" id="male"><label for="male">Male</label><br>
        <input type="radio" id="gender" name="gender" id="female"><label for="female">Female</label><br>
        <input type="radio" id="gender" name="gender" id="other"><label for="other">Other</label><br><br>

        <button><input type="submit" value="Submit"></button>
    </form>
</body>
</html>
