<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Survey form</h1>


    <label for="name">Name:</label><br>
    <input type="text" id="name" name="Name" placeholder="Name"><br><br>

    <label for="Age">Age:</label><br>
    <input type="text" id="Age" name="Age" placeholder="Age"><br><br>



    <label for="ftos">Favorite type of sport:</label><br>
    <input type="radio" id="indoor" name="ftos" value="Indoor">
    <label for="indoor">Indoor</label><br>

    <input type="radio" id="outdoor" name="ftos" value="Outdoor">
    <label for="outdoor">Outdoor</label><br>

    <input type="radio" id="both" name="ftos" value="Both">
    <label for="both">Both</label><br><br>



    
    <label for="F" name="F">Favorite sport to watch:</label><br>
    <input type="text" id="F" name="F" placeholder="Favorite sport to watch"><br><br>

    <label for="F2" name="F2">Favorite sport to play:</label><br>
    <input type="text" id="F2" name="F2" placeholder="Favorite sport to play"><br><br>

    <label for="F3">Favorite Sports-person:</label><br>
    <input type="text" id="F3" name="F3" placeholder="Favorite Sports-person"><br><br>


    <label for="comments">Your Thoughts on Sports(optional) :</label><br>
    <textarea id="comments" name="comments" rows="4" cols="50"></textarea><br><br>


    <input type="submit" value="Submit">


</body>
</html>
