<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>User personal information</h1>


    <label for="full name">Enter your full Name:</label><br>
    <input type="text" id="full name" name="full name" placeholder="Full Name"><br><br>

    <label for="email">Enter your Email:</label><br>
    <input type="email" id="email" name="email" placeholder="Email"><br><br>

    <label for="password">Enter your Password:</label><br>
    <input type="password" id="password" name="password" placeholder="Password"><br><br>

    <label for="Confirm password">Confirm your Password:</label><br>
    <input type="password" id="Confirm password" name="Confirm password" placeholder="Confirm Password"><br><br>

    <label for="gender">Select your gender:</label><br>

    <input type="radio" id="male" name="gender" value="male">
    <label for="male">Male</label><br>

    <input type="radio" id="female" name="gender" value="female">
    <label for="female">Female</label><br>

    <input type="radio" id="other" name="gender" value="other">
    <label for="other">Other</label><br><br>

    <label for="Enter your date of birth">Enter your date of birth:</label><br>
    <input type="date" id="Enter your date of birth" name="Enter your date of birth"><br><br>
    
    <label for="Enter your address">Enter your address:</label><br>
    <input type="text" id="Enter your address" name="Enter your address" placeholder="Address"><br><br>


    <input type="submit" value="Submit">

</body>
</html>
