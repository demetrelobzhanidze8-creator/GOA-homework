<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>basic HTML form</h1>

    <h3>Name</h3>

    <form>
        <label for="first name">First Name:</label>
        <input type="text" id="first name" name="first name"><br><br>

        <label for="last name">Last Name:</label>
        <input type="text" id="last name" name="last name"><br><br>

        <h2>Other Questions</h2>

        <label for="drink">Choose a drink:</label><br>
        <input type="radio" id="coffee" name="drink">
        <label for="coffee">Coffee</label><br>

        <input type="radio" id="tea" name="drink">
        <label for="tea">Tea</label><br>

        <input type="radio" id="hot chocolate" name="drink">
        <label for="hot chocolate">Hot Chocolate</label><br><br>

        <h2>What ice cream do you like?</h2>

        <input type="checkbox" id="chocolate" name="chocolate">
        <label for="chocolate">Chocolate</label><br>

        <input type="checkbox" id="chocolate pudding" name="chocolate pudding">
        <label for="chocolate pudding">chocolate pudding</label><br>

        <input type="checkbox" id="chocolate pudding buter" name="chocolate pudding buter">
        <label for="chocolate pudding buter">chocolate pudding buter</label><br>

        <input type="checkbox" id="vanilla" name="vanilla">
        <label for="vanilla">Vanilla</label><br>

        <input type="checkbox" id="strawberry" name="strawberry">
        <label for="strawberry">Strawberry</label>
        

        <h2>Select a school:</h2>

        <select id="school" name="school">
            <option value="school1">Harvard</option>
            <option value="school2">Lincoln</option>
            <option value="school3">Central</option>
        </select>

        <h3>Please provide comments:</h3>
        <textarea id="comments" name="comments" rows="4" cols="50"></textarea><br><br>

        <input type="submit" value="Submit">
    </form>
</body>
</html>
